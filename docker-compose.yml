services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - SQLITE_PATH=/app/data/mentorflow.sqlite
      - JWT_SECRET=${JWT_SECRET:-mentorflow-local-secret}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
    volumes:
      - mentorflow_sqlite:/app/data
  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server

volumes:
  mentorflow_sqlite:
