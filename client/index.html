<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MentorPulse turns mentorship conversations into measurable progress with privacy-first governance."
    />
    <title>MentorPulse | Structured Mentorship Platform</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("mentorflow_theme");
          var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
